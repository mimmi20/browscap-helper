# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

# file-version: 1.0

name: "Continuous Integration"

on:
  - pull_request
  - push

permissions:
  contents: read
  security-events: read
  issues: read
  pull-requests: read
  checks: read

concurrency:
  group: "${{ github.event_name }}-${{ github.workflow }}-${{ github.head_ref || github.run_id }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  validate-all:
    name: "Validate Project"

    uses: "mimmi20/ci/.github/workflows/validate-all.yml@8.5"
    with:
      skip-validate-yaml: false
      skip-validate-md: false

  validate-php:
    name: "Validate PHP"

    uses: "mimmi20/ci/.github/workflows/validate-php.yml@8.5"
    with:
      extensions: "bcmath, ctype, curl, dom, iconv, intl, mbstring, pdo, simplexml, tokenizer, xml, xmlwriter"
      ini-values: "opcache.enable=1, opcache.fast_shutdown=0, zend.assertions=1, assert.exception=On, intl.default_locale=de, intl.use_exceptions=1, zend.exception_ignore_args=0"
      composer-options: "--optimize-autoloader --prefer-dist --prefer-stable -v"
      skip-validate-composer: true
      skip-phplint: false
      skip-check-composer: false
      skip-ec-checker: true
      dependency-analyser-options: ""

  install:
    name: "Install Project"

    needs:
      - "validate-all"
      - "validate-php"

    uses: "mimmi20/ci/.github/workflows/install-php.yml@8.5"
    with:
      extensions: "bcmath, ctype, curl, dom, iconv, intl, mbstring, pdo, simplexml, tokenizer, xml, xmlwriter"
      ini-values: "opcache.enable=1, opcache.fast_shutdown=0, zend.assertions=1, assert.exception=On, intl.default_locale=de, intl.use_exceptions=1, zend.exception_ignore_args=0"
      composer-options: "--optimize-autoloader --prefer-dist --prefer-stable -v"
      skip-librabbitmq-install: true
      skip-libgif-install: true

  analytics:
    name: "Project Analysis"

    permissions:
      security-events: write
      id-token: write
      contents: read
      issues: read
      pull-requests: read
      checks: read

    needs: "install"

    uses: "mimmi20/ci/.github/workflows/analytics-php.yml@8.5"
    with:
      extensions: "bcmath, ctype, curl, dom, iconv, intl, mbstring, pdo, simplexml, tokenizer, xml, xmlwriter"
      ini-values: "opcache.enable=1, opcache.fast_shutdown=0, zend.assertions=1, assert.exception=On, intl.default_locale=de, intl.use_exceptions=1, zend.exception_ignore_args=0"
      composer-options: "--optimize-autoloader --prefer-dist --prefer-stable -v"
      skip-php-cs-fixer: true
      skip-phpcs: false
      skip-phpstan: false
      skip-rector: false
      use-code-scanning: true
      phpcs-options: ""

  # This is a meta job to avoid to have to constantly change the protection rules
  # whenever we touch the matrix.
  tests-status:
    name: "CI Status"

    runs-on: "ubuntu-latest"

    if: always()

    needs:
      - "analytics"

    steps:
      - name: Failing run
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'skipped') || contains(needs.*.result, 'cancelled') }}
        run: exit 1

      - name: Successful run
        if: ${{ !(contains(needs.*.result, 'failure')) && !(contains(needs.*.result, 'skipped')) && !(contains(needs.*.result, 'cancelled')) }}
        run: exit 0
